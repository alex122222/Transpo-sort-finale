<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transpo-Sort AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Leaflet & Drawing Assets -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.5);
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --text-main: #1e293b;
            --text-light: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            background: #f1f5f9;
        }

        #map-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            background: #cbd5e1;
        }

        #main-map {
            width: 100%;
            height: 100%;
        }

        .glass-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        h1 span {
            background: var(--accent);
            color: white;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .radio-group {
            display: flex;
            gap: 10px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.875rem;
            cursor: pointer;
        }

        label {
            font-size: 0.875rem;
            color: var(--text-light);
            font-weight: 500;
            display: flex;
            justify-content: space-between;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        .stats-card {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        button:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #ffffff;
            border-bottom-color: transparent;
            border-radius: 50%;
            animation: rotation 1s linear infinite;
            margin-left: auto;
            margin-right: auto;
        }

        @keyframes rotation {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div id="map-container">
        <div id="main-map"></div>
    </div>

    <div class="glass-panel">
        <h1>Transpo-Sort <span>AI</span></h1>

        <div class="control-group">
            <p style="font-size: 0.8rem; color: var(--text-light); margin: 0;">1. Use the square icon on map to draw
                your area.</p>
            <p style="font-size: 0.8rem; color: var(--text-light); margin: 0;">2. Adjust settings & generate.</p>
        </div>

        <div class="control-group">
            <label>City Layout</label>
            <div class="radio-group">
                <label class="radio-label">
                    <input type="radio" name="layout" value="grid" checked> Grid
                </label>
                <label class="radio-label">
                    <input type="radio" name="layout" value="organic"> Organic
                </label>
            </div>
        </div>

        <div class="control-group">
            <label>
                Number of Stops
                <span id="stops-val">12</span>
            </label>
            <input type="range" id="stops-slider" min="1" max="50" value="12"
                oninput="document.getElementById('stops-val').innerText = this.value">
        </div>

        <div class="control-group">
            <label>
                City Seed
                <span id="seed-val">42</span>
            </label>
            <input type="range" id="seed-slider" min="1" max="1000" value="42"
                oninput="document.getElementById('seed-val').innerText = this.value">
        </div>

        <button onclick="runOptimization()" id="optimize-btn">
            <span id="btn-text">Generate Selection</span>
            <div class="loader" id="loader"></div>
        </button>

        <button onclick="downloadGeoJSON()" id="download-btn" style="display: none; background-color: #10b981;">
            <span>Download GeoJSON</span>
        </button>

        <div class="stats-card">
            <span class="stat-label">Avg Walking Distance</span>
            <div class="stat-value" id="avg-dist">-- m</div>
        </div>
    </div>

    <script>
        // Initialize Map centered on Manhattan
        const map = L.map('main-map').setView([40.7831, -73.9712], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Manhattan Land Boundary (Reference)
        const manhattanLand = {
            "type": "Feature",
            "geometry": {
                "type": "Polygon",
                "coordinates": [[
                    [-74.020, 40.700], [-74.018, 40.710], [-74.010, 40.750],
                    [-73.990, 40.800], [-73.960, 40.850], [-73.930, 40.870],
                    [-73.910, 40.870], [-73.920, 40.850], [-73.940, 40.800],
                    [-73.950, 40.770], [-73.970, 40.740], [-73.975, 40.710],
                    [-74.020, 40.700]
                ]]
            }
        };

        L.geoJSON(manhattanLand, {
            style: {
                color: "#64748b",
                weight: 2,
                dashArray: '5, 10',
                fillOpacity: 0.1,
                fillColor: "#94a3b8"
            },
            interactive: false
        }).addTo(map);

        // Feature groups for drawing and results
        const drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);
        const resultLayer = new L.FeatureGroup();
        map.addLayer(resultLayer);
        const heatLayer = L.heatLayer([], { radius: 25, blur: 15, maxZoom: 17 });
        map.addLayer(heatLayer);

        const drawControl = new L.Control.Draw({
            draw: {
                polygon: true,
                polyline: false,
                rectangle: true,
                circle: false,
                marker: false,
                circlemarker: false
            },
            edit: {
                featureGroup: drawnItems,
                remove: true
            }
        });
        map.addControl(drawControl);

        map.on(L.Draw.Event.CREATED, function (e) {
            drawnItems.clearLayers();
            const layer = e.layer;
            drawnItems.addLayer(layer);
        });

        async function runOptimization() {
            const btn = document.getElementById('optimize-btn');
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btn-text');
            const avgDistEl = document.getElementById('avg-dist');

            // Find drawn polygon
            let drawnGeo = null;
            drawnItems.eachLayer(layer => {
                drawnGeo = layer.toGeoJSON().geometry;
            });

            if (!drawnGeo) {
                alert("Please draw an area on the map first!");
                return;
            }

            // UI Loading State
            btn.disabled = true;
            loader.style.display = 'block';
            btnText.style.display = 'none';
            avgDistEl.innerText = "Simulating...";

            const k = document.getElementById('stops-slider').value;
            const seed = document.getElementById('seed-slider').value;
            const layout = document.querySelector('input[name="layout"]:checked').value;

            try {
                const response = await fetch('/optimize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        k: parseInt(k),
                        seed: parseInt(seed),
                        layout: layout,
                        polygon: drawnGeo
                    })
                });

                const respData = await response.json();

                if (respData.status === 'ok') {
                    avgDistEl.innerText = respData.avg_dist + " m";

                    // Clear previous results
                    resultLayer.clearLayers();
                    heatLayer.setLatLngs([]);

                    // Render HeatMap (Density Map)
                    if (respData.demand) {
                        heatLayer.setLatLngs(respData.demand);
                    }

                    // Render Streets
                    L.geoJSON(respData.streets, {
                        style: { color: "#3b82f6", weight: 3, opacity: 0.6 }
                    }).addTo(resultLayer);

                    // Render Buildings
                    L.geoJSON(respData.buildings, {
                        style: { color: "#64748b", fillColor: "#94a3b8", fillOpacity: 0.5, weight: 1 }
                    }).addTo(resultLayer);

                    // Render HeatMap (Density Map)
                    if (respData.demand) {
                        heatLayer.setLatLngs(respData.demand);
                    }

                    // Render Stops
                    L.geoJSON(respData.stops, {
                        pointToLayer: (feature, latlng) => {
                            return L.circleMarker(latlng, {
                                radius: 7,
                                fillColor: "#2563eb",
                                color: "#fff",
                                weight: 2,
                                opacity: 1,
                                fillOpacity: 0.9
                            });
                        }
                    }).addTo(resultLayer);

                    // Adjust map view to new collection
                    if (respData.center) {
                        map.panTo(respData.center);
                    }

                    // Prepare GeoJSON for download
                    window.lastGeoJSON = {
                        type: "FeatureCollection",
                        features: [
                            ...respData.streets,
                            ...respData.buildings,
                            ...respData.stops.features
                        ]
                    };
                    document.getElementById('download-btn').style.display = 'block';
                } else {
                    alert('Error: ' + (respData.error || 'Optimization failed'));
                }
            } catch (e) {
                console.error(e);
                alert('Connection error');
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
                btnText.style.display = 'block';
            }
        }

        function downloadGeoJSON() {
            if (!window.lastGeoJSON) return;
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(window.lastGeoJSON, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "neighborhood_results.geojson");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }
    </script>
</body>

</html>
